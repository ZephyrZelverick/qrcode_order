<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 สั่งอาหารออนไลน์</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        .menu-card { transition: all 0.2s; }
        .menu-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-32">

    <header class="bg-gradient-to-r from-yellow-400 to-orange-500 text-white py-6 px-4 sticky top-0 shadow-md z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">🍲 แสกนสั่งอาหารคิวเร่งด่วน</h1>
            <div id="status-badge" class="bg-yellow-600 px-3 py-1 rounded-full text-xs font-semibold">เลือกรสชาติที่ชอบได้เลย</div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6">
        <h2 class="text-xl font-bold mb-4 text-gray-700">📋 เมนูแนะนำอาหารตามสั่ง</h2>
        <div id="menu-list" class="space-y-4"></div>
        
        <div id="order-tracking" class="hidden mt-6 bg-white border-2 border-green-400 p-4 rounded-xl shadow-sm text-center">
            <h3 class="font-bold text-lg text-green-600">🔔 สถานะออร์เดอร์ของคุณ</h3>
            <p id="track-status" class="text-gray-600 text-xl font-semibold mt-2">กำลังรอแม่ค้าเปิดรับคิว...</p>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg p-4 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-sm text-gray-500">รวมทั้งหมดในตะกร้า</p>
                <p class="text-2xl font-black text-orange-600">฿<span id="cart-total-price">0</span></p>
            </div>
            <button onclick="openCartModal()" class="bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold px-6 py-3 rounded-xl shadow-md hover:opacity-90">
                ดูตะกร้า (<span id="cart-count">0</span>)
            </button>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-3xl p-6 max-h-screen overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-xl font-bold">🛒 รายการในตะกร้าของคุณ</h3>
                <button onclick="closeCartModal()" class="text-gray-400 text-2xl font-bold">&times;</button>
            </div>
            
            <div class="mb-4 bg-yellow-50 p-3 rounded-xl border border-yellow-200">
                <label class="block text-gray-700 font-bold mb-1 text-sm">📍 ระบุหมายเลขโต๊ะ หรือ ชื่อคิวของคุณ:</label>
                <input type="text" id="tableInput" placeholder="ตัวอย่าง: โต๊ะ 3, กลับบ้าน, คิวพี่เอ็กซ์" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-sm bg-white">
            </div>

            <div id="cart-items" class="space-y-4 mb-6"></div>
            <button onclick="submitOrder()" class="w-full bg-green-500 text-white font-bold py-4 rounded-xl text-lg shadow-md hover:bg-green-600">
                🚀 ยืนยันส่งคำสั่งซื้อเข้าระบบ
            </button>
        </div>
    </div>

    <script>
        const foodMenu = [
            { id: 1, name: "ข้าวกะเพราหมูสับ", price: 50, img: "https://images.unsplash.com/photo-1626132647523-66f5bf380027?w=300" },
            { id: 2, name: "ข้าวผัดเมืองทอง", price: 55, img: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=300" },
            { id: 3, name: "ผัดซีอิ๊วหมูหมัก", price: 50, img: "https://images.unsplash.com/photo-1617093727343-374698b1b08d?w=300" }
        ];

        let cart = {};
        const backendUrl = "https://scrabble-flatten-exerciser.ngrok-free.dev";
        let ws;

        function renderMenu() {
            const container = document.getElementById("menu-list");
            container.innerHTML = foodMenu.map(item => `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden flex menu-card p-3 border border-gray-100">
                    <img src="${item.img}" class="w-24 h-24 object-cover rounded-lg mr-4 bg-gray-200">
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-lg">${item.name}</h3>
                            <p class="text-orange-600 font-bold">฿${item.price}</p>
                        </div>
                        <div class="flex justify-end items-center gap-2">
                            <button onclick="changeQty(${item.id}, -1)" class="bg-gray-100 text-gray-700 font-bold px-3 py-1 rounded-lg">-</button>
                            <span id="menu-qty-${item.id}" class="font-bold text-md w-6 text-center">0</span>
                            <button onclick="changeQty(${item.id}, 1)" class="bg-orange-500 text-white font-bold px-3 py-1 rounded-lg">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function changeQty(id, delta) {
            if (!cart[id]) cart[id] = { qty: 0, egg: false, note: "" };
            cart[id].qty += delta;
            if (cart[id].qty <= 0) delete cart[id];
            
            document.getElementById(`menu-qty-${id}`).innerText = cart[id] ? cart[id].qty : 0;
            updateCartSummary();
        }

        function updateCartSummary() {
            let totalItems = 0;
            let totalPrice = 0;
            for (let id in cart) {
                let menu = foodMenu.find(m => m.id == id);
                totalItems += cart[id].qty;
                totalPrice += (menu.price * cart[id].qty) + (cart[id].egg ? 10 * cart[id].qty : 0);
            }
            document.getElementById("cart-count").innerText = totalItems;
            document.getElementById("cart-total-price").innerText = totalPrice;
        }

        function openCartModal() {
            const container = document.getElementById("cart-items");
            if (Object.keys(cart).length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 my-4">ไม่มีสินค้าในตะกร้า</p>`;
            } else {
                container.innerHTML = Object.keys(cart).map(id => {
                    let menu = foodMenu.find(m => m.id == id);
                    return `
                        <div class="border-b pb-4">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold text-lg">${menu.name} (x${cart[id].qty})</span>
                                <span class="text-orange-600 font-bold">฿${menu.price * cart[id].qty}</span>
                            </div>
                            <div class="flex flex-col gap-2 bg-gray-50 p-3 rounded-lg text-sm">
                                <label class="flex items-center gap-2">
                                    <input type="checkbox" ${cart[id].egg ? 'checked' : ''} onchange="toggleEgg(${id}, this.checked)" class="rounded text-orange-500">
                                    🍳 เพิ่มไข่ดาว (+฿10 ต่อจาน)
                                </label>
                                <input type="text" placeholder="ระบุเพิ่มเติม (เช่น เผ็ดน้อย, ไม่ผัก)" value="${cart[id].note}" oninput="updateNote(${id}, this.value)" class="w-full border p-2 rounded bg-white">
                            </div>
                        </div>
                    `;
                }).join('');
            }
            document.getElementById("cart-modal").classList.remove("hidden");
        }

        function closeCartModal() { document.getElementById("cart-modal").classList.add("hidden"); }
        function toggleEgg(id, val) { cart[id].egg = val; updateCartSummary(); openCartModal(); }
        function updateNote(id, val) { cart[id].note = val; }

        async function submitOrder() {
            if (Object.keys(cart).length === 0) return;
            
            let orderItems = [];
            let totalPrice = parseInt(document.getElementById("cart-total-price").innerText);
            let tableInputVal = document.getElementById("tableInput").value.trim() || "ไม่ระบุโต๊ะ/คิว";
            
            for (let id in cart) {
                let menu = foodMenu.find(m => m.id == id);
                let inst = cart[id].note;
                if (cart[id].egg) inst = "เพิ่มไข่ดาว, " + inst;
                orderItems.push({
                    menu_item: menu.name,
                    quantity: cart[id].qty,
                    special_instructions: inst
                });
            }

            try {
                let res = await fetch(`${backendUrl}/api/order`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        table_number: tableInputVal,
                        total_price: totalPrice,
                        items: orderItems 
                    })
                });
                let data = await res.json();
                if (data.status === "success") {
                    closeCartModal();
                    alert("ส่งคำสั่งซื้อสำเร็จคิวคุณเข้าระบบแล้ว!");
                    trackOrder(data.order_ids[0]);
                }
            } catch (err) { alert("เกิดข้อผิดพลาดในการสั่งซื้อ"); }
        }

        function trackOrder(id) {
            document.getElementById("order-tracking").classList.remove("hidden");
            ws = new WebSocket(`${backendUrl.replace('http', 'ws')}/ws/customer/${id}`);
            ws.onmessage = function(event) {
                let data = JSON.parse(event.data);
                if (data.event === "status_update") {
                    let statusText = "กำลังรอแม่ค้าเปิดรับคิว...";
                    if (data.status === "cooking") statusText = "👨‍🍳 แม่ค้ารับออร์เดอร์แล้ว กำลังปรุงอาหารอยู่นะคะ";
                    if (data.status === "completed") {
                        statusText = "✅ อาหารทำเสร็จเรียบร้อย เชิญมารับได้เลยค่ะ!";
                        document.getElementById("track-status").className = "text-green-600 text-xl font-bold mt-2 animate-bounce";
                    }
                    document.getElementById("track-status").innerText = statusText;
                }
            };
        }

        renderMenu();
    </script>
</body>
</html>

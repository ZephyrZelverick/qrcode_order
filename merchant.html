<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👩‍🍳 ระบบจัดการร้านค้า (Real-time Dashboard)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <nav class="bg-indigo-900 text-white py-4 px-6 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-black tracking-wide">🍱 ระบบจัดการร้านค้าอาหารตามสั่ง</h1>
        <div id="status" class="bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold">กำลังเชื่อมต่อ...</div>
    </nav>

    <div class="max-w-6xl mx-auto p-6">
        <div class="flex gap-4 mb-6 border-b border-gray-300 pb-3">
            <button onclick="switchTab('live')" id="tab-live" class="text-lg font-bold px-4 py-2 text-indigo-900 border-b-4 border-indigo-900">📥 ออร์เดอร์ปัจจุบัน</button>
            <button onclick="switchTab('history')" id="tab-history" class="text-lg font-bold px-4 py-2 text-gray-500">📜 ประวัติรับเงินย้อนหลัง</button>
        </div>

        <div id="view-live" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div id="view-history" class="hidden bg-white p-6 rounded-2xl shadow-sm border">
            <h2 class="text-xl font-bold mb-4 text-indigo-900 flex justify-between">
                <span>ยอดขายเสร็จสิ้นย้อนหลัง</span>
                <span class="text-green-600">รวมรายได้: ฿<span id="total-revenue">0</span></span>
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 text-sm uppercase">
                            <th class="p-3 border-b">วัน-เวลา</th>
                            <th class="p-3 border-b">รายการอาหาร</th>
                            <th class="p-3 border-b">จำนวน</th>
                            <th class="p-3 border-b text-right">ยอดรับสุทธิ</th>
                        </tr>
                    </thead>
                    <tbody id="history-table" class="divide-y text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const backendUrl = "https://scrabble-flatten-exerciser.ngrok-free.dev";
        let ws;

        function connectWS() {  
            ws = new WebSocket(`${backendUrl.replace('http', 'ws')}/ws/merchant`);
            ws.onopen = () => {
                const badge = document.getElementById("status");
                badge.className = "bg-green-500 text-white px-3 py-1 rounded-full text-xs font-bold";
                badge.innerText = "เชื่อมต่อเรียลไทม์แล้ว";
                loadOrders();
                loadHistory();
            };
            ws.onmessage = (event) => {
                let data = JSON.parse(event.data);
                if (data.event === "new_order" || data.event === "order_updated") {
                    loadOrders();
                    loadHistory();
                }
            };
            ws.onclose = () => {
                document.getElementById("status").className = "bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold";
                document.getElementById("status").innerText = "หลุดการเชื่อมต่อ...";
                setTimeout(connectWS, 3000);
            };
        }

        async function loadOrders() {
            let res = await fetch(`${backendUrl}/api/orders`);
            let orders = await res.json();
            const container = document.getElementById("view-live");
            
            if(orders.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-gray-400 py-12 text-lg">🫙 ไม่มีออร์เดอร์ค้างในขณะนี้</p>`;
                return;
            }

            container.innerHTML = orders.map(order => {
                let statusColor = order.status === 'pending' ? 'bg-yellow-500' : 'bg-blue-500';
                let statusName = order.status === 'pending' ? 'รอแม่ค้ารับคำสั่ง' : 'กำลังปรุงอาหาร...';
                
                return `
                    <div class="bg-white rounded-2xl shadow-md border overflow-hidden flex flex-col justify-between">
                        <div class="p-5 border-b bg-gray-50 flex justify-between items-center">
                            <span class="font-bold text-gray-500 text-xs">คิวหมายเลข #${order.id}</span>
                            <span class="${statusColor} text-white px-3 py-1 rounded-full text-xs font-semibold">${statusName}</span>
                        </div>
                        <div class="p-5 flex-1">
                            <h3 class="font-extrabold text-xl text-gray-800 mb-1">${order.menu_item} <span class="text-indigo-600">x${order.quantity}</span></h3>
                            <p class="text-sm text-red-500 bg-red-50 p-2 rounded-lg font-medium mb-4">💡 หมายเหตุ: ${order.special_instructions || '-'}</p>
                        </div>
                        <div class="p-5 bg-gray-50 flex justify-between items-center">
                            <div>
                                <p class="text-xs text-gray-400">ราคารวมคิวนี้</p>
                                <p class="text-xl font-black text-indigo-900">฿${order.total_price}</p>
                            </div>
                            <div class="flex gap-2">
                                ${order.status === 'pending' ? 
                                    `<button onclick="updateStatus(${order.id}, 'cooking')" class="bg-blue-600 text-white font-bold px-4 py-2 rounded-xl text-sm shadow hover:bg-blue-700">🧑‍🍳 รับออร์เดอร์</button>` : 
                                    `<button onclick="updateStatus(${order.id}, 'completed')" class="bg-green-600 text-white font-bold px-4 py-2 rounded-xl text-sm shadow hover:bg-green-700">✅ ทำเสร็จแล้ว</button>`
                                }
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function loadHistory() {
            let res = await fetch(`${backendUrl}/api/orders/history`);
            let history = await res.json();
            const table = document.getElementById("history-table");
            let revenue = 0;

            table.innerHTML = history.map(row => {
                revenue += parseFloat(row.total_price);
                let date = new Date(row.created_at).toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="p-3 border-b text-gray-500">${date} น.</td>
                        <td class="p-3 border-b font-bold">${row.menu_item}</td>
                        <td class="p-3 border-b">x${row.quantity}</td>
                        <td class="p-3 border-b text-right font-black text-green-600">฿${row.total_price}</td>
                    </tr>
                `;
            }).join('');
            document.getElementById("total-revenue").innerText = revenue.toLocaleString();
        }

        async function updateStatus(id, nextStatus) {
            await fetch(`${backendUrl}/api/order/${id}/status`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: nextStatus })
            });
            loadOrders();
            loadHistory();
        }

        function switchTab(tab) {
            if(tab === 'live') {
                document.getElementById("view-live").classList.remove("hidden");
                document.getElementById("view-history").classList.add("hidden");
                document.getElementById("tab-live").className = "text-lg font-bold px-4 py-2 text-indigo-900 border-b-4 border-indigo-900";
                document.getElementById("tab-history").className = "text-lg font-bold px-4 py-2 text-gray-500";
            } else {
                document.getElementById("view-live").classList.add("hidden");
                document.getElementById("view-history").classList.remove("hidden");
                document.getElementById("tab-live").className = "text-lg font-bold px-4 py-2 text-gray-500";
                document.getElementById("tab-history").className = "text-lg font-bold px-4 py-2 text-indigo-900 border-b-4 border-indigo-900";
            }
        }

        connectWS();
    </script>
</body>
</html>
